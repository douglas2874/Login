<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/iconFlowing.png">
    <link rel="stylesheet" href="style.css">
    <title>Web Flowing</title>
</head>

<body>
    <section class="containerPai">
        <div class="card">
            <div class="cardEsquerda">
                <div class="formLogin">
                    <h2>
                        FAZER LOGIN
                    </h2>
                    <form>
                        <input type="email" placeholder="E-mail">
                        <input type="password" placeholder="Senha">
                        <button type="submit">Entrar</button>
                    </form>
                </div>
                <div class="facaLogin">
                    <h2>JA TEM UMA CONTA?</h2>
                    <p>Vamos transformar a sua ideia em um projeto. Comece por aqui.</p>
                    <button>Faça login</button>
                </div>
            </div>
            <div class="cardDireita">
                <div class="formCadastro">
                    <h2>
                        CADASTRO
                    </h2>
                    <form>
                        <input type="text" placeholder="Nome">
                        <input type="email" placeholder="E-mail">
                        <input type="password" placeholder="Senha">
                        <input type="password" placeholder="Confirmação de Senha">
                        <button type="submit">Cadastrar</button>
                    </form>
                </div>
                <div class="facaCadastro">
                    <h2>
                        ESTA SEM CADASTRO?
                    </h2>
                    <p>
                        Vamos transformar a sua ideia em um projeto. Comece aqui.
                    </p>
                    <button>
                        Cadastra-se
                    </button>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
